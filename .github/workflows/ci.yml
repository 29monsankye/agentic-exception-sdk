name: CI

on:
  push:
  pull_request:

jobs:
  static-and-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package and CI tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      # Static analysis targets the shipped package only. The
      # agentic_exception_sdk_examples/ tree is demo code that imports optional
      # frameworks (crewai, langgraph) and a sibling adapters package not
      # installed in CI, and is excluded from the wheel — linting/typechecking
      # it under --strict here would gate the SDK on uninstalled deps.
      - name: Ruff
        run: python -m ruff check src/agentic_exception_sdk tests
      - name: Mypy strict
        run: python -m mypy --strict --ignore-missing-imports src/agentic_exception_sdk
      - name: Bandit
        run: python -m bandit -r src/agentic_exception_sdk
      - name: pip-audit
        run: python -m pip_audit
      - name: Pytest
        run: python -m pytest tests/ --timeout=90
