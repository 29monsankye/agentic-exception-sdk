name: CI

on:
  push:
  pull_request:

jobs:
  static-and-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package and CI tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Ruff
        run: python -m ruff check src tests
      - name: Mypy strict
        run: python -m mypy --strict --ignore-missing-imports src
      - name: Bandit
        run: python -m bandit -r src
      - name: pip-audit
        run: python -m pip_audit
      - name: Pytest
        run: python -m pytest tests/ --timeout=90
