name: Publish to PyPI

# Publishes sdist + wheel to PyPI when a GitHub Release is published.
# Auth is via PyPI Trusted Publishing (OIDC) — no API tokens or secrets.
#
# One-time PyPI setup (project owner, in a browser):
#   pypi.org -> Account -> Publishing -> Add a pending publisher
#     Owner:       29monsankye
#     Repository:  agentic-exception-sdk
#     Workflow:    publish.yml
#     Environment: pypi
#
# Release flow:
#   1. bump version in pyproject.toml, tag v<version>
#   2. create a GitHub Release for that tag
#   3. this workflow builds and publishes to PyPI

on:
  release:
    types: [published]

permissions: {}

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/agentic-exception-sdk
    permissions:
      id-token: write  # OIDC token for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
