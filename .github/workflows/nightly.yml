name: Nightly Core Validation

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  core-adversarial:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Core tests with Hypothesis statistics
        run: HYPOTHESIS_PROFILE=ci python -m pytest tests/ --hypothesis-show-statistics
      - name: Mutmut scoped mutation smoke
        run: HYPOTHESIS_PROFILE=mutmut python -m mutmut run
